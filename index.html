<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page</title>
    <style>
      
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            font-family: 'Inter', 'Segoe UI', 'Arial', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

       
        .home-card {
            max-width: 1000px;
            width: 100%;
            background: #ffffff;
            border-radius: 2.5rem;
            box-shadow: 0 0 0 2px #000000;
            padding: 2.8rem 3rem 3.2rem 3rem;
            border: 4px solid #000000;
        }

    
        .page-title {
            font-size: 3.2rem;
            font-weight: 600;
            color: #000000;
            margin-bottom: 1.8rem;
            padding-bottom: 0.4rem;
            border-bottom: 4px solid #000000;
            display: inline-block;
            letter-spacing: -0.02em;
            text-transform: uppercase;
        }

       
        .container {
            display: flex;
            flex-direction: column;
            gap: 2rem;
            margin: 1.8rem 0 2.2rem 0;
            padding: 1rem;
            background: #ffffff;
            border: 3px solid #000000;
            border-radius: 60px;
        }

     
        .nav-select {
            font-size: 2.2rem;
            font-weight: 550;
            padding: 0.8rem 2.5rem 0.8rem 1.5rem;
            background: #ffffff;
            border: 3px solid #000000;
            border-radius: 50px;
            color: #000000;
            font-family: inherit;
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>');
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 1.8rem;
            width: fit-content;
            min-width: 240px;
        }

        .nav-select:hover {
            background-color: #f0f0f0;
        }

        .nav-select:focus {
            outline: 3px solid #000000;
            outline-offset: 2px;
        }

       .links {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 1.5rem;
            justify-content: flex-start;
        }


        .nav-button {
            font-size: 2.2rem;
            font-weight: 550;
            padding: 0.8rem 2rem;
            background: #ffffff;
            border: 3px solid #000000;
            border-radius: 50px;
            color: #000000;
            cursor: pointer;
            font-family: inherit;
            transition: none;
            min-width: 160px;
            box-shadow: none;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .nav-button:hover {
            background: #000000;
            color: #ffffff;
            border: 3px solid #000000;
        }

        .nav-button:active {
            opacity: 0.8;
            transform: scale(0.98);
        }

        a {
            text-decoration: none;
        }


        .favorites-panel {
            margin: 2.5rem 0 1rem 0;
            border: 4px solid #000000;
            border-radius: 50px;
            padding: 2rem 2.5rem 2rem 2.5rem;
            background: #ffffff;
            width: 100%;
        }

        .favorites-title {
            font-size: 2.8rem;
            font-weight: 600;
            color: #000000;
            margin-bottom: 2rem;
            border-bottom: 3px solid #000000;
            padding-bottom: 0.4rem;
            display: inline-block;
            text-transform: uppercase;
            letter-spacing: -0.01em;
        }

 
        .fav-options {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 2.5rem;
            margin: 1.8rem 0 1.5rem 0;
            font-size: 2.2rem;
            font-weight: 500;
            color: #000000;
        }

        .fav-option {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            cursor: default;
        }

        .circle {
            width: 2rem;
            height: 2rem;
            border: 3px solid #000000;
            border-radius: 50%;
            display: inline-block;
            background: #ffffff;
        }

      
        .favorites-dropdown-area {
            margin: 1.2rem 0 2rem 0;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .favorites-dropdown-label {
            font-size: 2rem;
            font-weight: 600;
            color: #000000;
            border-left: 4px solid #000;
            padding-left: 1.2rem;
        }

        .fav-dropdown {
            font-size: 2rem;
            font-weight: 550;
            padding: 0.8rem 2.5rem 0.8rem 1.5rem;
            background: #ffffff;
            border: 3px solid #000000;
            border-radius: 50px;
            color: #000000;
            font-family: inherit;
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>');
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 1.8rem;
            width: fit-content;
            min-width: 260px;
        }

        .fav-dropdown:hover {
            background-color: #f0f0f0;
        }
        .fav-dropdown:focus {
            outline: 3px solid #000000;
            outline-offset: 2px;
        }

   
        .dropdown-feedback {
            font-size: 1.8rem;
            color: #000000;
            border: 2px solid #000;
            border-radius: 40px;
            padding: 0.8rem 1.8rem;
            background: #ffffff;
            margin-top: 0.5rem;
            min-height: 4.5rem;
        }

        .fav-actions {
            display: flex;
            gap: 2rem;
            margin-top: 2rem;
            flex-wrap: wrap;
        }

        .fav-action-btn {
            font-size: 2.2rem;
            font-weight: 550;
            padding: 0.7rem 2.8rem;
            background: #ffffff;
            border: 3px solid #000000;
            border-radius: 60px;
            color: #000000;
            cursor: pointer;
            font-family: inherit;
            min-width: 140px;
            text-align: center;
        }

        .fav-action-btn:hover {
            background: #000000;
            color: #ffffff;
        }

        .bottom-hint {
            margin-top: 2.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            color: #000000;
            border-top: 3px solid #000000;
            padding-top: 1.2rem;
            font-weight: 500;
        }

        .dots {
            display: flex;
            gap: 0.5rem;
        }

        .dot {
            width: 10px;
            height: 10px;
            background: #000000;
            border-radius: 50%;
            border: 1px solid #000000;
        }


        .home-card, .container, .nav-select, .links, .nav-button, .page-title, .bottom-hint,
        .favorites-panel, .fav-option, .fav-action-btn, .fav-dropdown, .dropdown-feedback {
            box-shadow: none;
            text-shadow: none;
            filter: none;
        }

 
        @media (max-width: 700px) {
            .home-card { padding: 1.8rem; }
            .page-title { font-size: 2.4rem; }
            .nav-select { font-size: 1.8rem; min-width: 200px; }
            .nav-button { font-size: 1.8rem; padding: 0.6rem 1.2rem; min-width: 130px; }
            .links { gap: 1rem; }
            .favorites-panel { padding: 1.5rem; }
            .favorites-title { font-size: 2.2rem; }
            .fav-options { font-size: 1.9rem; gap: 1.8rem; }
            .fav-dropdown { font-size: 1.8rem; min-width: 220px; }
            .fav-action-btn { font-size: 1.9rem; padding: 0.5rem 1.8rem; min-width: 120px; }
        }

        @media (max-width: 500px) {
            .nav-select { width: 100%; }
            .links { flex-direction: column; width: 100%; }
            .nav-button { width: 100%; }
            .fav-options { flex-direction: column; align-items: flex-start; gap: 1rem; }
            .fav-dropdown { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="home-card">
  
        <div class="page-title">HOME PAGE</div>

     
        <div class="container">
         
            <select name="activities" class="nav-select" onchange="location = this.value;">
                <option value="#" selected>Activities </option>
                <option value="act1.html">Activity 1</option>
                <option value="Activity2.html">Activity 2</option>
            </select>

            
            <div class="links">
                <a href="Aboutme.html"><button type="button" class="nav-button">About Me</button></a>
                <a href="Gallery.html"><button type="button" class="nav-button">Gallery</button></a>
                <a href="favoriteslist.html"><button type="button" class="nav-button">Favorites</button></a>
            </div>
        </div>

</body>
</html>
