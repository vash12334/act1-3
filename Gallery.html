<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery </title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;  
            font-family: 'Courier New', 'Inter', 'Segoe UI', monospace, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
        }

       
        .gallery-card {
            max-width: 1000px;
            width: 100%;
            background: #ffffff;
            border: 5px solid #000000;
            border-radius: 2rem;
            padding: 2.5rem 2.5rem 2.8rem 2.5rem;
            box-shadow: none;
            line-height: 1.5;
        }

       
        .gallery-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border-bottom: 4px solid #000000;
            padding-bottom: 1rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .gallery-title {
            font-size: 3.5rem;
            font-weight: 700;
            color: #000000;
            text-transform: uppercase;
            letter-spacing: -0.02em;
        }

        .back-link {
            font-size: 1.8rem;
            font-weight: 600;
            color: #000000;
            text-decoration: none;
            border: 3px solid #000000;
            padding: 0.6rem 2rem;
            border-radius: 60px;
            background: #ffffff;
            transition: none;
        }

        .back-link:hover {
            background: #000000;
            color: #ffffff;
        }

        
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
            margin: 2rem 0 2.5rem 0;
        }

      
        .photo-item {
            border: 4px solid #000000;
            border-radius: 1.5rem;
            overflow: hidden;
            background: #ffffff;
            transition: transform 0.1s ease;
        }

        .photo-item:hover {
            transform: scale(1.02);
        }

      
        .photo-image {
            width: 100%;
            aspect-ratio: 1 / 1;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 3px solid #000000;
        }

        .photo-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        
        }

      
        .photo-caption {
            padding: 0.8rem 1rem;
            font-size: 1.5rem;
            font-weight: 500;
            color: #000000;
            text-align: center;
            background: #ffffff;
            border-top: 2px solid #000000;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

      
        .photo-image .fallback-text {
            font-size: 2rem;
            color: #000000;
            font-weight: bold;
        }

    
        .gallery-footer {
            margin-top: 2rem;
            border-top: 3px dashed #000000;
            padding-top: 1.5rem;
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .nav-button {
            font-size: 1.6rem;
            font-weight: 600;
            color: #000000;
            text-decoration: none;
            border: 3px solid #000000;
            padding: 0.6rem 1.8rem;
            border-radius: 50px;
            background: #ffffff;
        }

        .nav-button:hover {
            background: #000000;
            color: #ffffff;
        }

        
        *:not(img) {
            box-shadow: none !important;
            text-shadow: none !important;
        }

      
        @media (max-width: 800px) {
            .gallery-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 1.5rem;
            }
            .gallery-title { font-size: 2.8rem; }
        }

        @media (max-width: 500px) {
            .gallery-grid {
                grid-template-columns: 1fr;
            }
            .gallery-card { padding: 1.5rem; }
            .gallery-header { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
