<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Favorite Images · input your own</title>
    <style>
        /* pure black and white – no colors */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            font-family: 'Inter', 'Segoe UI', 'Arial', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .images-card {
            max-width: 950px;
            width: 100%;
            background: #ffffff;
            border-radius: 2rem;
            border: 4px solid #000000;
            padding: 2.5rem 2.8rem;
            box-shadow: 8px 8px 0 #000000;
        }

        .panel-header {
            margin-bottom: 2rem;
            border-bottom: 4px solid #000000;
            padding-bottom: 1rem;
        }

        .panel-header h1 {
            font-size: 2.8rem;
            font-weight: 700;
            color: #000000;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* input section */
        .input-section {
            background: #f5f5f5;
            border: 3px solid #000000;
            padding: 1.5rem;
            margin-bottom: 2.5rem;
            box-shadow: 4px 4px 0 #000000;
        }

        .input-row {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }

        .input-row label {
            font-size: 1.6rem;
            font-weight: 600;
            color: #000;
            min-width: 100px;
        }

        .image-input {
            flex: 1;
            min-width: 250px;
            padding: 0.8rem 1.2rem;
            font-size: 1.5rem;
            border: 2px solid #000;
            background: #fff;
            color: #000;
            font-family: inherit;
        }

        .image-input:focus {
            outline: 3px solid #000;
            outline-offset: 2px;
        }

        .update-btn {
            background: #ffffff;
            border: 2px solid #000000;
            color: #000000;
            font-size: 1.6rem;
            font-weight: 600;
            padding: 0.8rem 2rem;
            cursor: pointer;
            box-shadow: 3px 3px 0 #000000;
            transition: none;
        }

        .update-btn:hover {
            background: #000000;
            color: #ffffff;
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0 #333;
        }

        /* image grid */
        .image-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 3rem;
            margin: 2rem 0 3rem 0;
        }

        .image-item {
            flex: 0 1 300px;
            background: #ffffff;
            border: 3px solid #000000;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 5px 5px 0 #000000;
        }

        .image-frame {
            width: 100%;
            aspect-ratio: 1 / 1;
            border: 2px solid #000000;
            overflow: hidden;
            background: #e0e0e0;
        }

        .image-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .image-title {
            font-size: 1.6rem;
            font-weight: 600;
            color: #000;
            margin-top: 1rem;
            text-transform: uppercase;
        }

        /* back button */
        .action-row {
            display: flex;
            justify-content: flex-end;
            margin-top: 2rem;
            border-top: 3px solid #000000;
            padding-top: 2rem;
        }

        .back-btn {
            background: #ffffff;
            border: 3px solid #000000;
            color: #000000;
            font-size: 2rem;
            font-weight: 700;
            padding: 0.8rem 3rem 0.8rem 2.5rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.8rem;
            box-shadow: 5px 5px 0 #000000;
            transition: none;
            font-family: inherit;
        }

        .back-btn:hover {
            background: #000000;
            color: #ffffff;
            transform: translate(2px, 2px);
            box-shadow: 3px 3px 0 #333;
        }

        .back-arrow {
            font-size: 2.4rem;
            line-height: 1;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="images-card">
        <div class="panel-header">
            <h1>FAVORITE IMAGES</h1>
        </div>
        <div class="image-grid">
            <div class="image-item">
                <div class="image-frame">
                    <img id="displayImg1" src="10.jpg" alt="favorite 1">
                </div>
                
            </div>

            <div class="image-item">
                <div class="image-frame">
                    <img id="displayImg2" src="11.jpg" alt="favorite 2">
                </div>
              
            </div>
        </div>

        <!-- back button -->
        <div class="action-row">
            <button class="back-btn" id="backToHomeBtn">
                <span class="back-arrow">←</span> HOME
            </button>
        </div>
    </div>

    <script>
        (function() {
            // back button
            document.getElementById('backToHomeBtn')?.addEventListener('click', function() {
                window.location.href = 'index.html';
            });
        })();
    </script>
</body>
</html>
