<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity 2</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
       
            background-image: url('background.png');
            background-size: cover;
            background-attachment: fixed;
            background-position: center center;
            background-repeat: no-repeat;
            background-color: #f2e3d0;  

            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .activity-card {
            max-width: 1300px;
            width: 100%;
            background: rgba(255, 250, 240, 0.7);
            backdrop-filter: blur(2px);
            border-radius: 4rem 4rem 3rem 3rem;
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.25);
            padding: 2rem 2rem 3rem 2rem;
            border: 1px solid #ffe7c4;
        }

   
        .title-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 400;
            letter-spacing: 2px;
            color: #4b3a2b;
            border-left: 10px solid #ca9e6e;
            padding-left: 1.8rem;
            margin: 0;
            text-shadow: 2px 2px 0 #f0dbc0;
        }

   
        .back-home-btn {
            background: rgba(255, 250, 240, 0.9);
            border: 2px solid #8b6f50;
            color: #3a2c1e;
            font-size: 1.8rem;
            font-weight: 600;
            padding: 0.6rem 2rem 0.6rem 1.8rem;
            border-radius: 60px;
            cursor: pointer;
            backdrop-filter: blur(2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: all 0.15s;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            line-height: 1.2;
        }

        .back-home-btn:hover {
            background: #4b3a2b;
            color: #f2e3d0;
            border-color: #ca9e6e;
            transform: scale(1.02);
        }

        .back-home-btn:active {
            transform: scale(0.98);
        }

  
        .back-arrow {
            font-size: 2.4rem;
            line-height: 1;
        }

    
        .image-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 1.8rem 1.2rem;
            margin: 3rem 0 2.5rem 0;
        }

        .img-frame {
            display: flex;
            justify-content: center;
            align-items: center;
            background: transparent;
            transition: transform 0.2s ease;
        }

        .img-frame:hover {
            transform: scale(1.02);
        }

        .img-frame img {
            display: block;
            width: 140px;
            height: 140px;
            object-fit: cover;
            background: #f2e3d5;
            box-shadow: 0 8px 18px -6px rgba(90, 60, 30, 0.3);
            transition: all 0.15s;
        }

        .border1 { border: 6px solid #000000; border-radius: 45% 45% 40% 40%; }
        .border2 { border: 3px solid #000000; border-radius: 40% 50% 30% 60%; }
        .border3 { border: 10px double #000000; border-radius: 50% 40% 50% 40%; }
        .border4 { border: 5px dotted #000000; border-radius: 60% 40% 60% 40%; }
        .border5 { border: 8px ridge #000000; border-radius: 30% 60% 30% 60%; }
        .border6 { border: 4px dashed #000000; border-radius: 45% 45% 45% 45%; }
        .border7 { border: 12px groove #000000; border-radius: 55% 30% 55% 30%; }
        .border8 { border: 7px solid #000000; border-radius: 40% 60% 60% 40%; }
        .border9 { border: 9px inset #000000; border-radius: 63% 37% 51% 49%; }
        .border10 { border: 4px solid #000000; border-radius: 50% 50% 30% 30%; }

    
        .headers-pavilion {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 1rem;
            margin: 3rem 0 1rem 0;
            background: #353434;
            padding: 2rem 2rem 2rem 2rem;
            border-radius: 70px 70px 40px 40px;
            box-shadow: inset 0 0 0 1px #ffffff, 0 10px 14px -10px #ffffff;
        }

        .marquee-header {
            font-size: 1.9rem;
            font-weight: 500;
            background: #ffffff;
            padding: 0.6rem 0.4rem;
            border-radius: 60px;
            border: 1px solid #000000;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            color: #363635;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .marquee1 marquee { 
            background: linear-gradient(90deg, #000000, #ffffff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 700;
            text-shadow: 2px 2px 0 #000000, 4px 4px 0 rgba(0,0,0,0.1);
        }
        .marquee2 marquee {
            font-style: italic;
            text-decoration: underline wavy #000000;
            background-color: #000000;
            border-radius: 30px;
            padding: 0 10px;
        }
        .marquee3 marquee {
            direction: rtl;
            color: #000000;
            font-weight: 600;
            text-shadow: 0 0 5px #838180;
        }
        .marquee4 marquee {
            behavior: alternate;
            scrolldelay: 90;
            font-family: 'Courier New', monospace;
            background: #ffffff;
            color: #000000;
            font-weight: bold;
            border-radius: 40px 10px 40px 10px;
        }
        .marquee5 marquee {
            behavior: slide;
            loop: 5;
            background: #ffffff;
            color: #000000;
            border: 2px dotted #000000;
            border-radius: 20px 40px 20px 40px;
        }

        .marquee1 marquee { font-size: 2.2rem; }
        .marquee2 marquee { font-size: 1.9rem; font-weight: 400; color: #ffffff; }

        footer {
            margin-top: 1rem;
            color: #846b54;
        }
    </style>
</head>
<body>


    <div class="activity-card">

        <div class="title-bar">
            <h1>Activity 2</h1>
   
            <button class="back-home-btn" id="backToHomeBtn">
                <span class="back-arrow">←</span> Back
            </button>
        </div>


        <div class="image-grid">
            <div class="img-frame"><img class="border1" src="luffy.jpg" alt="luffy" loading="lazy"></div>
            <div class="img-frame"><img class="border2" src="zoro.jpg" alt="zoro" loading="lazy"></div>
            <div class="img-frame"><img class="border3" src="nami.jpg" alt="nami" loading="lazy"></div>
            <div class="img-frame"><img class="border4" src="ussop.jpg" alt="ussop" loading="lazy"></div>
            <div class="img-frame"><img class="border5" src="chopper.jpg" alt="chopper" loading="lazy"></div>
            <div class="img-frame"><img class="border6" src="sanji.jpg" alt="sanji" loading="lazy"></div>
            <div class="img-frame"><img class="border7" src="nami.jpg" alt="nami2" loading="lazy"></div>
            <div class="img-frame"><img class="border8" src="brook.png" alt="brook" loading="lazy"></div>
            <div class="img-frame"><img class="border9" src="franky.jpg" alt="franky" loading="lazy"></div>
            <div class="img-frame"><img class="border10" src="jinbei.jpg" alt="jinbei" loading="lazy"></div>
        </div>

     
        <div class="headers-pavilion">
            <div class="marquee-header marquee1">
                <marquee behavior="scroll" direction="left" scrollamount="8" truespeed scrolldelay="50"> Activity 2 </marquee>
            </div>
            <div class="marquee-header marquee2">
                <marquee behavior="scroll" direction="right" scrollamount="10" loop="infinite">✧ Vincent Razzlyn Alonzo  ·  BSEMC-3A ✧</marquee>
            </div>
            <div class="marquee-header marquee3">
                <marquee behavior="scroll" direction="left" scrollamount="7"> Activity 2 </marquee>
            </div>
            <div class="marquee-header marquee4">
                <marquee behavior="alternate" direction="left" scrollamount="6" loop="infinite" width="100%"> Activity 2 </marquee>
            </div>
            <div class="marquee-header marquee5">
                <marquee behavior="slide" direction="left" scrollamount="12" loop="3"> Activity 2 </marquee>
            </div>
        </div>
    </div>


    <script>
        (function() {
            const backBtn = document.getElementById('backToHomeBtn');
            if (backBtn) {
                backBtn.addEventListener('click', function() {

                    window.location.href = 'index.html'; 
                });
            }
        })();
    </script>
</body>
</html>
