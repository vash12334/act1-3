<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Favorite Songs </title>
    <style>
      
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            font-family: 'Inter', 'Segoe UI', 'Arial', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .songs-card {
            max-width: 1000px;
            width: 100%;
            background: #ffffff;
            border-radius: 2rem;
            border: 4px solid #000000;
            padding: 2.5rem 2.8rem;
            box-shadow: 8px 8px 0 #000000;
        }

        .panel-header {
            margin-bottom: 2rem;
            border-bottom: 4px solid #000000;
            padding-bottom: 1rem;
        }

        .panel-header h1 {
            font-size: 2.8rem;
            font-weight: 700;
            color: #000000;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .song-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
            margin: 2.5rem 0 3rem 0;
        }

        .song-item {
            background: #ffffff;
            border: 3px solid #000000;
            padding: 1.8rem 1.2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            box-shadow: 5px 5px 0 #000000;
            transition: none;
        }

        .song-item:hover {
            transform: translate(-2px, -2px);
            box-shadow: 8px 8px 0 #000000;
            background: #f0f0f0;
        }

        .song-title {
            font-size: 1.9rem;
            font-weight: 700;
            color: #000000;
            line-height: 1.3;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            border-bottom: 2px solid #000;
            padding-bottom: 0.5rem;
            width: 100%;
        }

        .link-row {
            display: flex;
            gap: 1.2rem;
            justify-content: center;
            flex-wrap: wrap;
            width: 100%;
        }

        .song-link {
            background: #ffffff;
            border: 2px solid #000000;
            color: #000000;
            font-size: 1.5rem;
            font-weight: 600;
            padding: 0.6rem 1.5rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 3px 3px 0 #000000;
            transition: none;
            cursor: pointer;
            font-family: inherit;
        }

        .song-link:hover {
            background: #000000;
            color: #ffffff;
            border-color: #000000;
            box-shadow: 1px 1px 0 #333333;
            transform: translate(2px, 2px);
        }

        .action-row {
            display: flex;
            justify-content: flex-end;
            margin-top: 2rem;
            border-top: 3px solid #000000;
            padding-top: 2rem;
        }

        .back-btn {
            background: #ffffff;
            border: 3px solid #000000;
            color: #000000;
            font-size: 2rem;
            font-weight: 700;
            padding: 0.8rem 3rem 0.8rem 2.5rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.8rem;
            box-shadow: 5px 5px 0 #000000;
            transition: none;
            font-family: inherit;
        }

        .back-btn:hover {
            background: #000000;
            color: #ffffff;
            border-color: #000000;
            box-shadow: 3px 3px 0 #333333;
            transform: translate(2px, 2px);
        }

        .back-arrow {
            font-size: 2.4rem;
            line-height: 1;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="songs-card">
        <div class="panel-header">
            <h1>🎵 FAVORITE SONGS</h1>
        </div>

     
        <div class="song-grid">
          
            <div class="song-item">
                <div class="song-title">JUST ONCE</div>
                <div class="link-row">
                    <button class="song-link" id="playJustOnce">▶ PLAY</button>
                    <button class="song-link" id="lyricsJustOnce">📄 LYRICS</button>
                </div>
            </div>

           
            <div class="song-item">
                <div class="song-title">LET ME BE THE ONE</div>
                <div class="link-row">
                    <button class="song-link" id="playLetMeBe">▶ PLAY</button>
                    <button class="song-link" id="lyricsLetMeBe">📄 LYRICS</button>
                </div>
            </div>

         
            <div class="song-item">
                <div class="song-title">THERE'S NO EASY WAY</div>
                <div class="link-row">
                    <button class="song-link" id="playNoEasyWay">▶ PLAY</button>
                    <button class="song-link" id="lyricsNoEasyWay">📄 LYRICS</button>
                </div>
            </div>

           
            <div class="song-item">
                <div class="song-title">PAGBIGYANG MULI</div>
                <div class="link-row">
                    <button class="song-link" id="playPagbigyang">▶ PLAY</button>
                    <button class="song-link" id="lyricsPagbigyang">📄 LYRICS</button>
                </div>
            </div>

           
            <div class="song-item">
                <div class="song-title">LIWANAG SA DILIM</div>
                <div class="link-row">
                    <button class="song-link" id="playLiwanag">▶ PLAY</button>
                    <button class="song-link" id="lyricsLiwanag">📄 LYRICS</button>
                </div>
            </div>
        </div>

   
        <div class="action-row">
            <button class="back-btn" id="backToHomeBtn">
                <span class="back-arrow">←</span> BACK
            </button>
        </div>
    </div>

    <script>
        (function() {
           
            const backBtn = document.getElementById('backToHomeBtn');
            if (backBtn) {
                backBtn.addEventListener('click', function() {
                    window.location.href = 'index.html'; 
                });
            }

        

           
            document.getElementById('playJustOnce')?.addEventListener('click', function() {
                window.open('https://www.youtube.com/watch?v=qYxGmzVbvkc&list=RDqYxGmzVbvkc&start_radio=1', '_blank'); 
            });
            document.getElementById('lyricsJustOnce')?.addEventListener('click', function() {
                window.open('https://www.azlyrics.com/lyrics/jamesingram/justonce.html', '_blank');
            });

            
            document.getElementById('playLetMeBe')?.addEventListener('click', function() {
                window.open('https://www.youtube.com/watch?v=yrFRypYaFm0&list=RDyrFRypYaFm0&start_radio=1', '_blank'); 
            });
            document.getElementById('lyricsLetMeBe')?.addEventListener('click', function() {
                window.open('https://www.azlyrics.com/lyrics/expose/letmebetheone.html', '_blank');
            });

          
            document.getElementById('playNoEasyWay')?.addEventListener('click', function() {
                window.open('https://www.youtube.com/watch?v=3vQ5KXii8-Q&list=RD3vQ5KXii8-Q&start_radio=1,', '_blank'); 
            });
            document.getElementById('lyricsNoEasyWay')?.addEventListener('click', function() {
                window.open('https://www.azlyrics.com/lyrics/jamesingram/theresnoeasyway.html', '_blank');
            });

        
            document.getElementById('playPagbigyang')?.addEventListener('click', function() {
                window.open('https://www.youtube.com/watch?v=up6jE9O39SU&list=RDup6jE9O39SU&start_radio=1', '_blank'); 
            });
            document.getElementById('lyricsPagbigyang')?.addEventListener('click', function() {
                window.open('https://www.musixmatch.com/lyrics/Erik-Santos/Pagbigyang-Muli', '_blank');
            });

           
            document.getElementById('playLiwanag')?.addEventListener('click', function() {
                window.open('https://www.youtube.com/watch?v=Av_n_jTK3OE&list=RDAv_n_jTK3OE&start_radio=1', '_blank'); 
            });
            document.getElementById('lyricsLiwanag')?.addEventListener('click', function() {
                window.open('https://www.azlyrics.com/lyrics/rivermaya/liwanagsadilim.html', '_blank');
            });
        })();
    </script>
</body>
</html>
